        items:
          - id: trace-happy-paths
            status: complete
            notes: "Traced full import→preview→matching→export flow. Found: (1) writeResume in useCreatePlaylistState.ts has no try-catch on sessionStorage.setItem — will crash if quota exceeded (confirms Phase 2 storage-quota bug). (2) initPromise reset is already implemented in client.ts:59-61 (Phase 2 item is verify-only). (3) fetchJson uses as T cast — type safety gap (confirms Phase 2 type-safety item). No logic bugs in happy path flow."
          - id: trace-error-paths
            status: complete
            notes: "Traced all error paths: setlist.fm 404/500/429 fully handled with retry; Apple Music search errors caught by allSettled with warning banner; token fetch resets on error; MusicKit init resets on error. Found: (1) ConnectAppleMusic.handleDisconnect calls onAuthorized after unauthorize — misleading callback triggers handleCreate which fails gracefully but causes UX flash. (2) All other error paths properly surface user-visible messages via ErrorAlert components."
          - id: concurrent-scenarios
            status: complete
            notes: "All major concurrency patterns verified: (1) setlist import uses AbortController + currentRequestRef for stale-request detection. (2) Track search uses searchRunIdRef for stale-run detection. (3) Token fetch uses promise singleton with proper reset on failure. (4) autoMatchAll uses runIdRef for stale-run detection with batch processing. (5) Minor: handleCreate in useCreatePlaylistState has no explicit guard against double invocation — UI disables button via loading state but handleAuthorized could theoretically double-invoke. Low severity."
          - id: browser-edge-cases
            status: complete
            notes: "Checked 4 scenarios: (1) JS disabled — page renders SSR content (instructions, form HTML) but is non-functional. No noscript fallback but acceptable. (2) Cookies/storage blocked — readHistory/writeHistory have try-catch, readResume has try-catch, but writeResume LACKS try-catch (confirmed storage-quota bug). MusicKit auth failure handled gracefully. (3) Slow network — all async flows have loading indicators (LoadingButton, StatusText, dynamic import fallbacks). (4) MusicKit CDN blocked — 10s timeout in waitForMusicKit, error propagates and resets initPromise, ConnectAppleMusic shows error."

